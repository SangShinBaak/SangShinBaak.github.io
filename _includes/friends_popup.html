<style>
  #friends-widget {
    position: fixed;
    right: 1.5rem;
    bottom: 5rem;
    z-index: 9998;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    align-items: center;
  }

  .friend-btn {
    width: 2.4rem;
    height: 2.4rem;
    border-radius: 50%;
    background: transparent;
    color: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    box-shadow: none;
    font-size: 1rem;
    transition: transform 0.15s, opacity 0.2s;
    position: relative;
    opacity: 0.7;
  }
  .friend-btn:hover {
    background: transparent;
    transform: scale(1.15);
    opacity: 1;
    text-decoration: none;
  }

  /* 호버 시 이름 툴팁 */
  .friend-btn::after {
    content: attr(data-name);
    position: absolute;
    right: 3rem;
    background: rgba(0,0,0,0.72);
    color: #fff;
    font-size: 0.78rem;
    padding: 3px 8px;
    border-radius: 5px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }
  .friend-btn:hover::after {
    opacity: 1;
  }
</style>

<div id="friends-widget">
  <!-- 지인 추가: 아래 <a> 블록을 복사해서 붙여넣으면 아이콘이 하나 더 생깁니다 -->
  <a class="friend-btn"
     href="https://taeyoungphys.github.io/notes/"
     target="_blank"
     rel="noopener noreferrer"
     data-name="이태영의 물리노트">
    <i class="fas fa-user"></i>
  </a>

  <a class="friend-btn"
     href="https://sites.google.com/view/seungholeephysics/home?authuser=0"
     target="_blank"
     rel="noopener noreferrer"
     data-name="Seungho Lee Physics">
    <img src="/assets/img/friends/seungho.png"
         style="width:1.4rem;height:1.4rem;border-radius:50%;object-fit:cover;">
  </a>
</div>
