<!-- MathJax: $...$ 인라인, $$...$$ 디스플레이 수식 -->
<script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      tags: 'ams',
      processEscapes: true
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
    }
  };
</script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-mml-chtml.min.js"></script>

<style>
  /* Google Translate 상단 배너 숨기기 */
  .goog-te-banner-frame.skiptranslate { display: none !important; }
  body { top: 0 !important; }
  #google_translate_element select {
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    /* ── Google Translate ── */
    var translateDiv = document.createElement('div');
    translateDiv.id = 'google_translate_element';
    translateDiv.style.cssText =
      'position:fixed;bottom:24px;right:24px;z-index:9999;' +
      'background:#fff;border-radius:10px;padding:6px 10px;' +
      'box-shadow:0 2px 12px rgba(0,0,0,0.18);font-size:13px;';
    document.body.appendChild(translateDiv);

    var gtScript = document.createElement('script');
    gtScript.src = '//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
    document.head.appendChild(gtScript);
  });
</script>

<script>
  function googleTranslateElementInit() {
    new google.translate.TranslateElement({
      pageLanguage: 'ko',
      includedLanguages: 'ko,en,ja,zh-CN,es,fr,de',
      layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
      autoDisplay: false
    }, 'google_translate_element');
  }
</script>
