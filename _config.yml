# =============================================================
#  al-folio 기반 물리 블로그 설정
#  https://github.com/alshedivat/al-folio
# =============================================================

# --- 기본 정보 ---
title: "Sunshine Physics"
first_name: 상신
last_name: "박"
email: hekate5210@korea.ac.kr
description: >
  Physics blog

footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a>
  with <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.

# --- URL 설정 ---
# GitHub username.github.io 형식이면 baseurl 비워두기
# 프로젝트 페이지(username.github.io/repo-name)면 baseurl: "/repo-name"
url: ""          # 예: https://username.github.io
baseurl: ""

# --- 소셜 링크 ---
github_username: ""    # GitHub 아이디
# twitter_username: ""
# linkedin_username: ""

# --- 테마 ---
# al-folio를 fork한 뒤 사용하는 것이 기본이지만,
# remote_theme으로도 사용 가능
# remote_theme: alshedivat/al-folio

# 라이트/다크 모드 코드 하이라이팅 테마
repo_theme_light: default
repo_theme_dark: dark

# --- 기능 플래그 ---
enable_google_analytics: false    # GA4 사용 시 true + google_analytics_id 입력
# google_analytics_id: "G-XXXXXXXXXX"

enable_cronitor_analytics: false
enable_google_verification: false
enable_bing_verification: false

enable_masonry: false             # 블로그 목록 masonry 레이아웃
enable_math: true                 # MathJax 전역 활성화
enable_tooltips: false
enable_darkmode: true             # 다크모드 토글

# --- 블로그 ---
blog_name: "물리 블로그"
blog_nav_title: "Blog"
blog_description: "물리 개념 · 논문 리뷰 · 공부 일지"
permalink: /blog/:year/:title/

# 태그/카테고리 아카이브 (jekyll-archives 사용)
show_categories: true
show_tags: true

# 포스트 페이지네이션
pagination:
  enabled: true
  per_page: 5
  permalink: '/page/:num/'
  title: ':title - page :num'
  limit: 0
  sort_field: 'date'
  sort_reverse: true
  trail:
    before: 2
    after: 2

# --- Jekyll Scholar (논문/참고문헌 관리) ---
scholar:
  last_name: []
  first_name: []
  style: apa
  locale: en
  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib
  replace_strings: true
  join_strings: true
  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details
  query: "@*"

# --- MathJax 설정 ---
# _includes/head/custom.html 에서 상세 설정 관리

# --- Markdown & 하이라이터 ---
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  auto_ids: true
  entity_output: as_char
  toc_levels: [1, 2, 3]
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  math_engine: null
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false

# --- Sass ---
sass:
  style: compressed

# --- 플러그인 ---
plugins:
  - jekyll-archives
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-link-attributes
  - jekyll-paginate-v2
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-toc

# jekyll-archives: 태그 및 카테고리 페이지 자동 생성
jekyll-archives:
  enabled:
    - tags
    - categories
  layouts:
    tag: tag
    category: category
  permalinks:
    tag: /blog/tag/:name/
    category: /blog/category/:name/

# --- 링크 속성 ---
external_links:
  enabled: true
  rel: external nofollow noopener
  target: _blank
  exclude:
    - "localhost"

# --- Include / Exclude ---
include:
  - _pages

exclude:
  - "*.gemspec"
  - "*.gem"
  - Gemfile.lock
  - vendor
  - .bundle
  - .jekyll-cache
  - .sass-cache
  - README.md
  - CHANGELOG.md
  - CONTRIBUTING.md

# --- 기타 ---
lang: ko
last_updated: true
enable_navbar_social: false

